<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up- Welcome</title>
    <link rel="stylesheet" href="CSS/signup.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
  </head>
  <body>
    <div class="general-container">
      <div class="form-container">
        <!-- Title -->
        <div class="form-title">
          <h2>
            Sign Up for <span class="highlights">MyApplicatn Trackr</span>
          </h2>
          <p>Fill in your details to get started</p>
        </div>

        <!-- Google Button -->
        <button class="google-btn">
          <i class="fab fa-google"></i> Sign up with Google
        </button>

        <!-- Divider -->
        <p class="divider">or continue with</p>

        <!-- Form -->
        <form id="signupForm">
          <div class="form-group">
            <label for="fullName">Full Name</label>
            <input type="text" id="fullName" placeholder="John Doe" />
          </div>

          <div class="form-group">
            <label for="email">Email address</label>
            <input type="email" id="email" placeholder="johndoe@gmail.com" />
          </div>

          <div class="form-group">
            <label for="password">Create Password</label>
            <div class="password-wrapper">
              <input
                type="password"
                id="password"
                placeholder="Create your password"
              />
              <i class="fas fa-eye-slash" id="togglePassword"></i>
            </div>
          </div>

          <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <div class="password-wrapper">
              <input
                type="password"
                id="confirmPassword"
                placeholder="Confirm your password"
              />
              <i class="fas fa-eye-slash" id="toggleConfirmPassword"></i>
            </div>
          </div>

          <!-- Terms -->
          <div class="accept-terms">
            <input type="checkbox" id="terms" />
            <label for="terms">I have read and understand the terms</label>
          </div>

          <div
            id="formMessage"
            class="form-message"
            role="alert"
            aria-live="polite"
          ></div>

          <!-- Submit Button -->
          <button type="submit" class="signup-button">
            Create an Account →
          </button>
        </form>

        <!-- Log in link -->
        <div class="sign-up">
          <p>Already have an account? <a href="log-in.html">Log in</a></p>
        </div>
      </div>
    </div>
    <script src="JavaScript/signup.js"></script>
  </body>
</html>
