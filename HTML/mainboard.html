<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MyApplicationTrackr</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../CSS/mainboard.css"/>
</head>
<body>

<!-- MAIN -->
<main class="wrapper">

  <!-- NAVBAR -->
  <nav>
    <a class="nav-logo" href="#">
      <img src="../Images/logo.png" alt="Logo Image" width="200" height="35"/>
    </a>
    <div class="nav-links">
      <a class="nav-link active" href="#">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Home
      </a>
    </div>
    <div class="notif-wrapper">
      <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
      <span class="notif-dot"></span>
    </div>
    <a class="nav-icon" href="profile-settings.html">
      <img src="../Images/icon.png" alt="Icon Image" width="40" height="40"/>
    </a>
  </nav>

  <!-- Stats Pills -->
  <div class="stats-bar">
    <div class="stat-pill">Total Applications: <span>0</span></div>
    <div class="stat-pill">Active Interviews: <span>0</span></div>
    <div class="stat-pill">Pending Follow-ups: <span>0</span></div>
    <div class="stat-pill">Offers: <span>0</span></div>
  </div>

  <!-- Page Header -->
  <div class="page-header">
    <h1 class="page-title">Manage Applications</h1>
    <div class="header-actions">
      <div class="search-box">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" placeholder="Search…" />
      </div>
      <button class="btn-add">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add New Application
      </button>
    </div>
  </div>

  <!-- Filter Tab -->
  <div class="filter-row">
    <span class="filter-tab">All Applications (Active)</span>
  </div>

  <!-- Table -->
  <div class="table-card">
    <table>
      <thead>
        <tr>
          <th>Company</th>
          <th>Role</th>
          <th>Status</th>
          <th>Date Applied</th>
          <th>Deadline</th>
          <th>Type</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        <!-- Rows are rendered by JavaScript -->
      </tbody>
    </table>
  </div>

  <!-- Pagination -->
  <div class="pagination"></div>

</main>

<script src="../JavaScript/mainboard.js"></script>
</body>
</html>
