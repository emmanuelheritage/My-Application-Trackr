<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="..\CSS\profile-settings.css">
    <title>Profile Settings</title>
</head>
<body>
       <main>
        <nav></nav>
        <div id="profilesettings">
            <div id="profilechanges">
                <div id="image"> 
                    <img src="..\Images\Rectangle 30.png" alt="Profile Picture">
                    <button id="upload">Upload new photo</button>
                </div>
                <div id="input">
                    <input type="text" placeholder="Name">
                    <input type="text" placeholder="Email Address">
                    <input type="text" placeholder="Phone Number">
                </div>
            </div>
            <div id="options">
                <div id="savechanges">
                    <div id="buttons">
                        <button id="save">
                            Save Changes
                        </button>
                        <button id="cancel">
                            Cancel
                        </button>
                    </div>
                </div>
                 <div id="delete">
                    <a href="\">
                        Delete account
                    </a>
                    <a href="\">
                        Log out
                    </a>
                 </div>  
            </div>
        
        </div>
        
       </main>
</body>
</html>
